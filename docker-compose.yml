services:
  assistant:
    build: .
    container_name: claudio
    hostname: claudio
    platform: linux/arm64
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - QDRANT_HOST=qdrant
      - OPENAI_API_KEY=not-needed
      - MEM0_EMBEDDING_MODEL=nomic-embed-text:latest
      - MEM0_LLM_MODEL=llama3.1:8b
      - KRAKEN_CLI_ENABLED=${KRAKEN_CLI_ENABLED:-true}
      - KRAKEN_API_KEY=${KRAKEN_API_KEY:-}
      - KRAKEN_API_SECRET=${KRAKEN_API_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3333:3333"
    volumes:
      - whisper_cache:/home/assistant/.cache
      - claude_data:/home/assistant/.claude
      - ${PROJECTS_PATH:-.}:/home/assistant/projects:cached
      - memory:/home/assistant/memory
    shm_size: 2g
    restart: unless-stopped
    depends_on:
      - qdrant
      - ollama
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 12g

  ollama:
    image: ollama/ollama:0.20.5
    container_name: claudio-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: claudio-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: claudio-tunnel
    command: tunnel --no-autoupdate --url http://claudio:3333
    depends_on:
      - assistant
    restart: unless-stopped

volumes:
  claude_data:
  memory:
  ollama_data:
  qdrant_data:
  whisper_cache:
